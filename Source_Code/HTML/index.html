<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Chess Game</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="game-container">
        <h1>Online Chess Game</h1>

        <button id="restart-btn">Restart Game</button>


        <div class="top-layout">
            <div class="side-column">
                <div class="panel-box">
                    <h3>White Captured</h3>
                    <div id="captured-white" class="captured-pieces"></div>
                </div>
            </div>

            <div class="center-column">

                <div class="turn-box">
           <h3>Current Turn</h3>
           <div id="turn-display" class="turn-display">White's Turn</div>
            </div>
                <div class="board-section">
                    <div id="chessboard" class="chessboard"></div>
                </div>

                <div class="history-box">
                    <h3>Move History</h3>
                    <div id="move-history" class="move-history"></div>
                </div>
            </div>

            <div class="side-column">
                <div class="panel-box">
                    <h3>Black Captured</h3>
                    <div id="captured-black" class="captured-pieces"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../javascript/Piece.js"></script>
    <script src="../javascript/King.js"></script>
    <script src="../javascript/Queen.js"></script>
    <script src="../javascript/Rook.js"></script>
    <script src="../javascript/Bishop.js"></script>
    <script src="../javascript/Knight.js"></script>
    <script src="../javascript/Pawn.js"></script>
    <script src="../javascript/Game.js"></script>
    <script src="../javascript/script.js"></script>
</body>
</html>
