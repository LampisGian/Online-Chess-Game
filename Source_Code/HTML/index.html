<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Chess Game</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="game-container">
        <h1>Online Chess Game</h1>

        <div class="top-buttons">
            <button id="restart-btn">Restart Game</button>
            <button id="main-menu-btn">Main Menu</button>
            <button id="mute-btn">Mute Music</button>
        </div>

        <div class="top-layout">
            <div class="side-column">
                <div id="white-panel" class="panel-box">
                    <h3>White Captured</h3>
                    <div id="captured-white" class="captured-pieces"></div>
                </div>
            </div>

            <div class="center-column">
                <div class="board-section">
                    <div class="board-wrapper">
                        <div class="top-coords">
                            <span>a</span>
                            <span>b</span>
                            <span>c</span>
                            <span>d</span>
                            <span>e</span>
                            <span>f</span>
                            <span>g</span>
                            <span>h</span>
                        </div>

                        <div class="board-middle">
                            <div class="side-coords">
                                <span>8</span>
                                <span>7</span>
                                <span>6</span>
                                <span>5</span>
                                <span>4</span>
                                <span>3</span>
                                <span>2</span>
                                <span>1</span>
                            </div>

                            <div id="chessboard" class="chessboard"></div>

                            <div class="side-coords">
                                <span>8</span>
                                <span>7</span>
                                <span>6</span>
                                <span>5</span>
                                <span>4</span>
                                <span>3</span>
                                <span>2</span>
                                <span>1</span>
                            </div>
                        </div>

                        <div class="bottom-coords">
                            <span>a</span>
                            <span>b</span>
                            <span>c</span>
                            <span>d</span>
                            <span>e</span>
                            <span>f</span>
                            <span>g</span>
                            <span>h</span>
                        </div>
                    </div>
                </div>

                <div class="history-box">
                    <h3>Move History</h3>
                    <div id="move-history" class="move-history"></div>
                </div>
            </div>

            <div class="side-column">
                <div id="black-panel" class="panel-box">
                    <h3>Black Captured</h3>
                    <div id="captured-black" class="captured-pieces"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="checkmate-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="winner-icon" id="winner-icon">♕</div>
            <h2 id="checkmate-title">Checkmate!</h2>
            <p id="checkmate-message">White wins the game.</p>
            <div class="modal-buttons">
                <button id="play-again-btn">Play Again</button>
                <button id="modal-menu-btn">Main Menu</button>
            </div>
        </div>
    </div>

    <div id="restart-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2>Restart Game?</h2>
            <p>Your current progress will be lost.</p>
            <div class="modal-buttons">
                <button id="confirm-restart-btn">Yes</button>
                <button id="cancel-restart-btn">Cancel</button>
            </div>
        </div>
    </div>

    <audio id="bg-music" src="../assets/sounds/background.mp3" loop></audio>
    <audio id="move-sound" src="../assets/sounds/move.mp3" preload="auto"></audio>
    <audio id="capture-sound" src="../assets/sounds/capture.mp3" preload="auto"></audio>
    <audio id="win-sound" src="../assets/sounds/win.mp3" preload="auto"></audio>

    <script src="../javascript/Piece.js"></script>
    <script src="../javascript/King.js"></script>
    <script src="../javascript/Queen.js"></script>
    <script src="../javascript/Rook.js"></script>
    <script src="../javascript/Bishop.js"></script>
    <script src="../javascript/Knight.js"></script>
    <script src="../javascript/Pawn.js"></script>
    <script src="../javascript/Game.js"></script>
    <script src="../javascript/script.js"></script>
</body>
</html>
